<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us - SSR Motors</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">SSR Motors</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Contact Us</h2>
            <div
                style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <form onsubmit="event.preventDefault(); alert('Message sent successfully!'); this.reset();">
                    <div class="form-group"><label>Name</label><input type="text" required></div>
                    <div class="form-group"><label>Email</label><input type="email" required></div>
                    <div class="form-group"><label>Message</label><textarea rows="4" required></textarea></div>
                    <button type="submit" class="add-to-cart">Send Message</button>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
